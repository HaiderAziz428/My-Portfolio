<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Explore the professional portfolio of Haidar Aziz, a skilled full-stack web developer and designer with expertise in the MERN stack and Web3 technologies."
    />
    <meta name="author" content="Haidar Aziz" />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="../src//images/favicon-32x32.png"
    />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="../src/images/favicon-16x16.png"
    />
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph Meta Tags for Social Sharing -->
    <meta property="og:title" content="💛 Haidar Aziz - Portfolio" />
    <meta
      property="og:description"
      content="Explore the professional portfolio of Haidar Aziz, showcasing expertise in full-stack web development and cutting-edge Web3 technologies."
    />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:url" content="https://haidaraziz.netlify.app/" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="💛 Haidar Aziz - Portfolio" />
    <meta
      name="twitter:description"
      content="Explore the professional portfolio of Haidar Aziz, showcasing expertise in full-stack web development and cutting-edge Web3 technologies."
    />
    <meta name="twitter:image" content="/og-image.png" />
    <meta name="twitter:creator" content="@haidaraziz" />

    <!-- Preconnect for Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin="anonymous"
    />

    <!-- Web Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- SEO Enhancements -->
    <meta name="robots" content="index, follow" />
    <meta
      name="keywords"
      content="Haidar Aziz, full-stack developer, portfolio, MERN stack, Web3, web development"
    />

    <!-- Title -->
    <title>💛 Haidar Aziz - Web Developer Portfolio</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
